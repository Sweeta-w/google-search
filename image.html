<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Image Search</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
    }
    h1 {
      font-size: 64px;
    }

    .nav {
      display: flex;
      justify-content: flex-end;
      padding: 20px;
    }

    .nav a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
    }

    .main {
      text-align: center;
      margin-top: 150px;
    }

    .search-box {
      width: 500px;
      height: 44px;
      border-radius: 24px;
      border: 1px solid #dfe1e5;
      padding: 0 20px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #f8f9fa;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    .btn:hover {
      border: 1px solid #dfe1e5;
    }
  </style>
</head>

<body>

  <div class="nav">
    <a href="index.html">Google Search</a>
    <a href="advanced.html">Advanced Search</a>
  </div>

  <div class="main">
    <h1><span style="color: #0b57d0;">G</span><span style="color: red;">o</span><span
        style="color: yellow;">o</span><span style="color: #0b57d0;">g</span><span style="color: green;">l</span><span
        style="color: red;">e</span></h1>
    <form action="https://www.google.com/search">
      <div>
        <input type="text" name="q" class="search-box">
        <input type="hidden" name="tbm" value="isch">
      </div>
      <input class="btn" type="submit" value="Image Search">
    </form>
  </div>

</body>

</html>
