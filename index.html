<!DOCTYPE html>
<html lang="en">

<head>
    <title>Search</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            padding: 0;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            padding: 16px 20px;

        }

        nav a {
            text-decoration: none;
            color: #0b57d0;
            font-weight: bold;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }


        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="text"] {
            width: 500px;
            height: 44px;
            border-radius: 24px;
            border: 1px solid #dfe1e5;
            padding: 0 20px;
            outline: none;
        }
        h1 {
            font-size: 64px;
            margin-bottom: 20px;
        }

        #buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #f8f9fa;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            border: 1px solid #dfe1e5;
        }
        footer {
            
            text-align: right;
            padding: 15px 20px;  
        }
        #developer {
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 5px;

        }
        #developer:hover {
            background-color: rgb(181, 237, 239);
        }
    </style>
</head>


<body>
    <div class="container">
        <nav>
            <a href="image.html">Image Search</a>
            <a href="advanced.html">Advanced Search</a>
        </nav>
        <main>
            <h1><span style="color: #0b57d0;">G</span><span style="color: red;">o</span><span
                style="color: yellow;">o</span><span style="color: #0b57d0;">g</span><span
                style="color: green;">l</span><span style="color: red;">e</span></h1>
        <form action="https://google.com/search">
            <input type="text" name="q" placeholder="Search Google">
            <div id="buttons">
                <input class="btn" type="submit" value="Google Search">
                <button class="btn" type="submit" name="btnI" value="1">
                    I'm Feeling Lucky
                </button>

            </div>

        </form>

        
        </main>
        <footer>&copy; Made by <a href="https://www.linkedin.com/in/sweeta-k-7103972a6/" id="developer" target="_blank"><span style="color: #0b57d0;">S</span><span style="color: red;">W</span><span
                style="color: rgb(234, 234, 146);">E</span><span style="color: #0b57d0;">E</span><span
                style="color: green;">T</span><span style="color: red;">A</span>

        </a></footer>
        
    </div>

</body>

</html>
